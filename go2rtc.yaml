# go2rtc sidecar config — restreams the USB-capture VTX feed as WebRTC so both
# OBS and the mission-control overlay (webrtc-url mode) can consume the single,
# single-owner capture card. Enable by running with GO2RTC=1 and a go2rtc binary
# on PATH; pass the device through via config.json "devices" (e.g. /dev/video0).
#
# The overlay connects to the WHEP endpoint set in mission_config.json
# ui.video_url, e.g.  http://<host>:1984/api/whep?src=cloudburst

api:
  listen: ":1984"

streams:
  cloudburst:
    # Linux V4L2 USB capture card. Adjust device/format to match your hardware;
    # `go2rtc` can also probe with:  go2rtc -config go2rtc.yaml  then open :1984.
    - "ffmpeg:device?video=/dev/video0&input_format=mjpeg&video_size=1920x1080#video=h264#hardware"

webrtc:
  # LAN-only launch site: advertise the host's LAN IP, no STUN/TURN needed.
  candidates:
    - stun:disable
